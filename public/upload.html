<!DOCTYPE html>
<html>

<head>
    <title>Upload File - MyFiles</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📤 Upload File</h1>

<form>

<h2>📤 Upload New File</h2>

<input
type="text"
id="fileName"
placeholder="Enter file name">

<br><br>

<input
type="file"
id="file">

<br><br>

<button type="submit">
📤 Upload File
</button>

</form>

<br>

<a href="dashboard.html">
<button type="button">⬅ Back to Dashboard</button>
</a>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  const firebaseConfig = {
  apiKey: "AIzaSyB0i-UUX2LjqK19Z0rzpirEF8mTnEeH9c4",
  authDomain: "police-file.firebaseapp.com",
  projectId: "police-file",
  storageBucket: "police-file.firebasestorage.app",
  messagingSenderId: "678648437133",
  appId: "1:678648437133:web:3bf6d3d2c597549966c5c4"
};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
    
const cloudName = "crsyohqc";
const uploadPreset = "myfiles_upload";


document.querySelector("form").addEventListener("submit", async (e)=>{

e.preventDefault();


const file = document.getElementById("file").files[0];


if(!file){

alert("Please select a file");

return;

}


const formData = new FormData();

formData.append("file", file);

formData.append("upload_preset", uploadPreset);


try{


const response = await fetch(
`https://api.cloudinary.com/v1_1/${cloudName}/auto/upload`,
{
method:"POST",
body:formData
}
);


const data = await response.json();


console.log(data);


await addDoc(collection(db, "files"), {

    fileName: file.name,

    fileURL: data.secure_url,

    fileType: file.type,

    uploadedAt: new Date()

});


alert("File uploaded successfully!");


} catch(error){


alert("Upload failed");


}


});

</script>

</body>

</html>

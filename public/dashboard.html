<!DOCTYPE html>
<html>

<head>
    <title>MyFiles Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📁 MyFiles Dashboard</h1>

<h2>Welcome</h2>

<p>Manage your files easily.</p>

<br>

<a href="upload.html">
<button>📤 Upload File</button>
</a>

<br><br>

<a href="files.html">
<button>📂 View Files</button>
</a>

<br><br>

<button id="logoutBtn">🚪 Logout</button>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0i-UUX2LjqK19Z0rzpirEF8mTnEeH9c4",
  authDomain: "police-file.firebaseapp.com",
  projectId: "police-file",
  storageBucket: "police-file.firebasestorage.app",
  messagingSenderId: "678648437133",
  appId: "1:678648437133:web:3bf6d3d2c597549966c5c4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Protect the page
onAuthStateChanged(auth, (user) => {

    if (!user) {
        window.location.href = "index.html";
    }

});

// Logout
document.getElementById("logoutBtn").addEventListener("click", async () => {

    await signOut(auth);

    window.location.href = "index.html";

});

</script>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <title>MyFiles - Register</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📁 MyFiles</h1>

<h2>Create Account</h2>

<form>

<label>Full Name</label><br>
<input type="text" id="name" placeholder="Enter your full name">

<br><br>

<label>Email</label><br>
<input type="email" id="email" placeholder="Enter your email">

<br><br>

<label>Password</label><br>
<input type="password" id="password" placeholder="Create a password">

<br><br>

<button type="button">Register</button>

</form>

<br>

<p>Already have an account?</p>

<a href="index.html">
<button type="button">Login Here</button>
</a>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0i-UUX2LjqK19Z0rzpirEF8mTnEeH9c4",
  authDomain: "police-file.firebaseapp.com",
  projectId: "police-file",
  storageBucket: "police-file.firebasestorage.app",
  messagingSenderId: "678648437133",
  appId: "1:678648437133:web:3bf6d3d2c597549966c5c4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.querySelector("button").addEventListener("click", async () => {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {

        await createUserWithEmailAndPassword(auth, email, password);

        alert("Registration successful!");

        window.location.href = "index.html";

    } catch (error) {

        alert(error.message);

    }

});

</script>
</body>

</html>
